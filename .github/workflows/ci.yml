name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  core:
    name: Core checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm run check

      - name: Validate authored content
        run: npm run content:validate

      - name: Compile content manifest
        run: npm run content:compile

      - name: Build production app
        run: npm run build

  diagnostics:
    name: Balance and reachability diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p reports/ci

      - name: Run balance matrix
        run: |
          set -o pipefail
          npm run balance:matrix | tee reports/ci/balance-matrix.txt

      - name: Run reachability report
        run: |
          set -o pipefail
          npm run reachability:report | tee reports/ci/reachability-report.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-diagnostics
          path: reports/ci/*.txt
          if-no-files-found: ignore
          retention-days: 14

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
